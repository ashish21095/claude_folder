name: Job Hunter Agent

on:
  schedule:
    # Runs at 7:00, 13:00, 19:00, 01:00 IST (UTC+5:30)
    # = 01:30, 07:30, 13:30, 19:30 UTC
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
    - cron: "30 19 * * *"
  workflow_dispatch:      # allows manual trigger from GitHub UI anytime

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Hunter Agent
        env:
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python orchestrator.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
